<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Actual CPI in Iran</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f2ee;
            --card: #ffffff;
            --border: #e0dcd5;
            --text: #1a1a1a;
            --muted: #8a8580;
            --accent: #c0392b;
            --accent2: #2c6e49;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --font-fa: 'Vazirmatn', sans-serif;
            --font-en: 'Inter', -apple-system, sans-serif;
        }

        body {
            font-family: var(--font-en);
            background: var(--bg);
            color: var(--text);
            padding: 32px 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-family: var(--font-fa);
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
        }

        .header .subtitle {
            font-size: 15px;
            color: var(--muted);
            margin-top: 2px;
        }

        .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .meta-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px 18px;
            box-shadow: var(--shadow);
            font-size: 13px;
            flex: 0 0 auto;
        }

        .meta-card .num {
            font-weight: 700;
            font-size: 18px;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .meta-card .label {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .controls {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .control-group select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-fa);
            background: #fff;
            cursor: pointer;
            min-width: 120px;
        }

        .control-group select option {
            font-family: var(--font-fa);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
            cursor: pointer;
        }

        .checkbox-group input {
            cursor: pointer;
        }

        .chart-wrap {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .chart-wrap canvas {
            width: 100%;
            height: 520px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        .footer a {
            color: var(--muted);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--text);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>نماگر قیمت مصرف‌کننده در ایران</h1>
            <div class="subtitle">The Actual CPI in Iran — matched-sample indices from Torob data</div>
        </div>

        <div class="meta-row" id="meta-row"></div>

        <div class="controls" id="controls">
            <div class="control-group">
                <label>L1</label>
                <select id="l1-select">
                    <option>Loading...</option>
                </select>
            </div>
            <div class="control-group">
                <label>L2</label>
                <select id="l2-select">
                    <option value="__all__">همه</option>
                </select>
            </div>
            <div class="control-group">
                <label>L3</label>
                <select id="l3-select">
                    <option value="__all__">همه</option>
                </select>
            </div>
            <div style="flex:1"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-bands">
                <label for="show-bands">Show IQR bands</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-overall" checked>
                <label for="show-overall">Show overall</label>
            </div>
            <div class="control-group">
                <label>Base</label>
                <select id="base-select"></select>
            </div>
        </div>

        <div class="chart-wrap">
            <canvas id="chart"></canvas>
        </div>

        <div class="footer">
            <a href="https://github.com/mahdi-nasehiyan/the-actual-cpi-in-iran">GitHub</a>
            &middot; Data from <a href="https://torob.com">Torob</a>
            &middot; <a href="../data/cpi_indices.csv" download>Download index data</a>
        </div>
    </div>

    <script>
        let allRows = [];
        let chart = null;
        let categories = { l1: new Set(), l2: {}, l3: {} };

        const PALETTE = [
            '#c0392b', '#2c6e49', '#2c3e50', '#d4a017', '#8e44ad',
            '#2980b9', '#e67e22', '#16a085', '#7f8c8d', '#c0392b'
        ];

        async function load() {
            const csvText = await fetch('../data/cpi_indices.csv').then(r => r.text());
            const parsed = Papa.parse(csvText, { header: true, dynamicTyping: true });
            allRows = parsed.data.filter(r => r.ym && r.median != null);

            for (const r of allRows) {
                const m = +r.median;
                r.median_pct = (m < 10) ? m * 100 : m;
                r.q25_pct = (r.q25 != null && +r.q25 < 10) ? r.q25 * 100 : (+r.q25 || r.median_pct);
                r.q75_pct = (r.q75 != null && +r.q75 < 10) ? r.q75 * 100 : (+r.q75 || r.median_pct);
            }

            for (const r of allRows) {
                categories.l1.add(r.cat_level_1);
                if (!categories.l2[r.cat_level_1]) categories.l2[r.cat_level_1] = new Set();
                if (r.cat_level_2) categories.l2[r.cat_level_1].add(r.cat_level_2);
                const l2k = `${r.cat_level_1}||${r.cat_level_2}`;
                if (!categories.l3[l2k]) categories.l3[l2k] = new Set();
                if (r.cat_level_3) categories.l3[l2k].add(r.cat_level_3);
            }

            renderMeta();
            populateL1();
            populateBase();
            draw();
        }

        function renderMeta() {
            const l1n = categories.l1.size;
            const l2n = new Set(allRows.map(r => r.cat_level_2)).size;
            const l3n = new Set(allRows.map(r => r.cat_level_3)).size;
            const yms = allRows.map(r => r.ym).sort();
            const minYm = yms[0];
            const maxYm = yms[yms.length - 1];
            const avgN = Math.round(allRows.reduce((s, r) => s + (r.n || 0), 0) / allRows.length);

            const row = document.getElementById('meta-row');
            row.innerHTML = `
                <div class="meta-card"><div class="num">${l1n} · ${l2n} · ${l3n}</div><div class="label">L1 · L2 · L3 Categories</div></div>
                <div class="meta-card"><div class="num">${allRows.length.toLocaleString()}</div><div class="label">Index Rows</div></div>
                <div class="meta-card"><div class="num">${minYm} → ${maxYm}</div><div class="label">Date Range (Jalali)</div></div>
                <div class="meta-card"><div class="num">${avgN}</div><div class="label">Avg Sample Size</div></div>
            `;
        }

        function populateL1() {
            const sel = document.getElementById('l1-select');
            const sorted = [...categories.l1].sort();
            sel.innerHTML = `<option value="__all__">همه</option>` + sorted.map(c => `<option value="${c}">${c}</option>`).join('');
            sel.addEventListener('change', () => { populateL2(); populateL3(); draw(); });
            populateL2();
        }

        function populateL2() {
            const l1 = document.getElementById('l1-select').value;
            const sel = document.getElementById('l2-select');
            const items = categories.l2[l1] || new Set();
            const sorted = [...items].sort();
            sel.innerHTML = `<option value="__all__">همه</option>` + sorted.map(c => `<option value="${c}">${c}</option>`).join('');
            sel.addEventListener('change', () => { populateL3(); draw(); });
            populateL3();
        }

        function populateL3() {
            const l1 = document.getElementById('l1-select').value;
            const l2 = document.getElementById('l2-select').value;
            const sel = document.getElementById('l3-select');
            const key = `${l1}||${l2}`;
            const items = categories.l3[key] || new Set();
            const sorted = [...items].sort();
            sel.innerHTML = `<option value="__all__">همه</option>` + sorted.map(c => `<option value="${c}">${c}</option>`).join('');
            sel.addEventListener('change', draw);
        }

        function populateBase() {
            const yms = [...new Set(allRows.map(r => r.ym))].sort();
            const sel = document.getElementById('base-select');
            sel.innerHTML = yms.map(m => `<option value="${m}">${m}</option>`).join('');
            sel.value = yms[0];
            sel.addEventListener('change', draw);
        }

        function median(arr) {
            const s = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(s.length / 2);
            return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
        }

        function rebaseWithBands(pts, baseYm) {
            const base = pts.find(p => p.x === baseYm);
            if (!base) return [];
            const baseMed = base.y;
            return pts.map(p => ({
                x: p.x,
                y: Math.round((p.y / baseMed) * 10000) / 100,
                q25: Math.round((p.q25 / baseMed) * 10000) / 100,
                q75: Math.round((p.q75 / baseMed) * 10000) / 100,
                n: p.n
            }));
        }

        function draw() {
            const l1 = document.getElementById('l1-select').value;
            const l2 = document.getElementById('l2-select').value;
            const l3 = document.getElementById('l3-select').value;
            const baseYm = document.getElementById('base-select').value;
            const showOverall = document.getElementById('show-overall').checked;
            const showBands = document.getElementById('show-bands').checked;

            let filtered = allRows;
            if (l1 !== '__all__') filtered = filtered.filter(r => r.cat_level_1 === l1);
            if (l2 !== '__all__') filtered = filtered.filter(r => r.cat_level_2 === l2);
            if (l3 !== '__all__') filtered = filtered.filter(r => r.cat_level_3 === l3);

            let groupField;
            if (l3 !== '__all__') groupField = 'cat_level_3';
            else if (l2 !== '__all__') groupField = 'cat_level_3';
            else if (l1 !== '__all__') groupField = 'cat_level_2';
            else groupField = 'cat_level_1';

            const groups = {};
            for (const r of filtered) {
                const key = r[groupField];
                if (!groups[key]) groups[key] = {};
                if (!groups[key][r.ym]) groups[key][r.ym] = [];
                groups[key][r.ym].push({ y: r.median_pct, q25: r.q25_pct, q75: r.q75_pct, n: r.n || 0 });
            }

            // ── FIX: only months from base onwards ──
            const months = [...new Set(filtered.map(r => r.ym))].sort().filter(m => m >= baseYm);

            const datasets = [];

            for (const [key, monthMap] of Object.entries(groups)) {
                const pts = [];
                for (const month of months) {
                    const arr = monthMap[month];
                    if (!arr) continue;
                    pts.push({
                        x: month,
                        y: median(arr.map(p => p.y)),
                        q25: median(arr.map(p => p.q25)),
                        q75: median(arr.map(p => p.q75)),
                        n: arr.reduce((s, p) => s + p.n, 0)
                    });
                }
                if (!pts.length) continue;

                const rebased = rebaseWithBands(pts, baseYm);
                if (!rebased.length) continue;

                const color = PALETTE[datasets.length % PALETTE.length];

                if (showBands) {
                    datasets.push({
                        label: `${key}__q25`,
                        data: rebased.map(p => ({ x: p.x, y: p.q25 })),
                        borderColor: 'transparent',
                        backgroundColor: color + '18',
                        pointRadius: 0,
                        fill: false,
                        order: 2,
                        _parentLabel: key,
                    });
                    datasets.push({
                        label: `${key}__q75`,
                        data: rebased.map(p => ({ x: p.x, y: p.q75 })),
                        borderColor: 'transparent',
                        backgroundColor: color + '18',
                        pointRadius: 0,
                        fill: '-1',
                        order: 1,
                        _parentLabel: key,
                    });
                }

                datasets.push({
                    label: key,
                    data: rebased.map(p => ({ x: p.x, y: p.y, n: p.n })),
                    borderColor: color,
                    backgroundColor: color,
                    tension: 0.25,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    borderWidth: 2.5,
                    fill: false,
                    order: 0,
                    _parentLabel: key,
                });
            }

            if (showOverall && datasets.length > 0) {
                const byMonth = {};
                for (const ds of datasets) {
                    if (ds.label.includes('__')) continue;
                    for (const p of ds.data) {
                        if (!byMonth[p.x]) byMonth[p.x] = [];
                        byMonth[p.x].push(p.y);
                    }
                }
                const overallPts = Object.keys(byMonth).sort().map(ym => {
                    const vals = byMonth[ym];
                    return { x: ym, y: Math.round(median(vals) * 100) / 100 };
                });
                const rebasedOverall = rebaseWithBands(overallPts, baseYm);
                if (rebasedOverall.length) {
                    datasets.unshift({
                        label: 'Overall Index',
                        data: rebasedOverall,
                        borderColor: '#1a1a1a',
                        borderDash: [6, 4],
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        order: -1,
                        _parentLabel: 'Overall Index',
                    });
                }
            }

            const ctx = document.getElementById('chart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 400 },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 14,
                                padding: 18,
                                font: { size: 12, family: "'Vazirmatn', 'Inter', sans-serif" },
                                usePointStyle: true,
                                filter: (item) => !item.text.includes('__'),
                            },
                            onClick: (e, legendItem, legend) => {
                                const ci = legend.chart;
                                const clickedLabel = legendItem.text;
                                ci.data.datasets.forEach((ds, i) => {
                                    if (ds._parentLabel === clickedLabel) {
                                        const meta = ci.getDatasetMeta(i);
                                        meta.hidden = meta.hidden === null ? !ci.data.datasets[i].hidden : null;
                                    }
                                });
                                ci.update();
                            },
                        },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const pt = ctx.raw;
                                    const n = pt.n ? ` (n=${pt.n})` : '';
                                    return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}${n}`;
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            type: 'category',
                            labels: months,
                            title: { display: true, text: 'Month (Jalali)', font: { size: 12 } },
                            ticks: { maxRotation: 40, font: { size: 11 } },
                            grid: { display: false },
                        },
                        y: {
                            title: { display: true, text: 'Index (base = 100)', font: { size: 12 } },
                            beginAtZero: false,
                            grid: { color: '#f0ede8' },
                            ticks: { font: { size: 11 } },
                        },
                    },
                    interaction: { mode: 'index', intersect: false },
                },
            });
        }

        document.getElementById('show-bands').addEventListener('change', draw);
        document.getElementById('show-overall').addEventListener('change', draw);

        load();
    </script>
</body>

</html>
